baseURL = "https://jiaoyuan.org"
title = "JiaoYuan's blog"
theme = "PaperMod"
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
pygmentsUseClasses = true

[pagination]
  pagerSize = 20

[minify]
  disableXML = true
  minifyOutput = true

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    noClasses = false
    lineNos = true

[params]
  description = "JiaoYuan's blog description"
  keywords = ["Blog", "Portfolio", "PaperMod"]
  DateFormat = "2006年1月2日"
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = false
  ShowRssButtonInSectionTermList = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = true

  [params.assets]
    favicon = "/favicon.ico"
    favicon16x16 = "/favicon.ico"
    favicon32x32 = "/favicon.ico"
    apple_touch_icon = "/favicon.ico"
    safari_pinned_tab = "/favicon.ico"

  [params.label]
    text = "JiaoYuan's blog"
    icon = ""
    iconHeight = 35

  [params.homeInfoParams]
    Title = "Hi there, Welcome"
    Content = "Fleeting thoughts come and go, but sometimes, they pause and stay here."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/imjiaoyuan"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

[menu]
  [[menu.main]]
    name = "LOGS"
    url = "/logs"
    weight = 1
  [[menu.main]]
    name = "ARCHIVES"
    url = "/archives"
    weight = 2
  [[menu.main]]
    name = "README"
    url = "/readme"
    weight = 3
